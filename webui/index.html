<!DOCTYPE html>
<html lang="de">

<head>
    <title>HB-RF-ETH-ng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <!-- Progressive Web App: makes the WebUI installable ("Add to Home
         screen" on iOS Safari, "Install app" in Chrome/Edge/Brave on
         Android). Once installed it opens in a standalone window without
         browser chrome. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#d96a5a" />
    <!-- iOS Safari does not install from the manifest; it relies on these
         apple-* meta tags + the apple-touch-icon when the user picks
         "Zum Home-Bildschirm" from the share sheet. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HB-RF-ETH-ng" />
    <meta name="application-name" content="HB-RF-ETH-ng" />
    <link rel="apple-touch-icon" href="/icon-256.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icon-256.png" />
    <!-- Never cache the HTML shell: it carries the cache-busting ?v=<hash>
         query params that point at the current JS/CSS build. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Inter typeface (primary font family; loaded preconnect+swap so there
         is no FOIT, and the system-ui fallback chain in main.css renders
         cleanly while Inter loads or if the CDN is unreachable). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
</head>
<body class="newdesign-active">
  <!-- The New Design is now the only supported WebUI. The class is fixed in
       the HTML shell so no retired-layout flash is possible before Vue mounts. -->
  <div id="app"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
