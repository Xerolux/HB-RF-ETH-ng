name: Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v2.1.7)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION_TAG=v$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TRIGGERED_BY_TAG=true" >> "$GITHUB_OUTPUT"
          else
            echo "TRIGGERED_BY_TAG=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python for version update
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Update all version numbers and changelog
        if: steps.get_version.outputs.TRIGGERED_BY_TAG == 'false'
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.VERSION }}"
          python update_changelog.py "$NEW_VERSION"
          python update_version.py "$NEW_VERSION"
          git status --short

      - name: Commit version changes and create tag
        if: steps.get_version.outputs.TRIGGERED_BY_TAG == 'false'
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"

          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: bump version to $NEW_VERSION"
          fi

          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            git tag -d "$VERSION_TAG"
          fi

          git tag -a "$VERSION_TAG" -m "Release $VERSION_TAG"
          git push origin HEAD:main
          git push -f origin "$VERSION_TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build New Design WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Prepare embedded and standalone WebUI assets
        run: python3 rename_webui_files.py

      - name: Regenerate embedded firmware archive
        run: python3 scripts/update_archive.py

      - name: Setup ESP-IDF v6.1-beta1
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 --branch v6.1-beta1 https://github.com/espressif/esp-idf.git "$HOME/esp-idf"
          git -C "$HOME/esp-idf" submodule update --init --recursive --depth 1
          "$HOME/esp-idf/install.sh" esp32

      - name: Build firmware and standalone WWW image
        run: |
          . "$HOME/esp-idf/export.sh"
          export IDF_TARGET=esp32
          export SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.hb-rf-eth-ng"
          idf.py build

      - name: Create release directory
        run: mkdir -p release

      - name: Copy firmware and New Design files
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          if [ -f "build/HB-RF-ETH-ng.bin" ]; then
            cp "build/HB-RF-ETH-ng.bin" "release/firmware_${VERSION}.bin"
          else
            FIRST_APP_BIN=$(find build -maxdepth 1 -name "*.bin" \
              ! -name "spiffs.bin" \
              ! -name "bootloader.bin" \
              ! -name "partition-table.bin" | head -n 1)
            if [ -z "$FIRST_APP_BIN" ]; then
              echo "ERROR: No app firmware binary found in build/" >&2
              find build -maxdepth 2 -type f || true
              exit 1
            fi
            cp "$FIRST_APP_BIN" "release/firmware_${VERSION}.bin"
          fi

          test -f build/spiffs.bin
          WEBUI_SIZE=$(stat -c '%s' build/spiffs.bin)
          EXPECTED_WEBUI_SIZE=$((0x50000))
          if [ "$WEBUI_SIZE" -ne "$EXPECTED_WEBUI_SIZE" ]; then
            echo "ERROR: spiffs.bin has $WEBUI_SIZE bytes, expected $EXPECTED_WEBUI_SIZE" >&2
            exit 1
          fi
          cp build/spiffs.bin "release/webui_${VERSION}.bin"

          cp "build/bootloader/bootloader.bin" release/ 2>/dev/null || true
          if [ -f "build/partition_table/partition-table.bin" ]; then
            cp "build/partition_table/partition-table.bin" "release/partitions.bin"
          fi
          cp version.txt release/

      - name: Generate release notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          python generate_release_notes.py "$VERSION" release/RELEASE_NOTES.md

      - name: Create checksums
        run: |
          cd release
          sha256sum *.bin > SHA256SUMS.txt

      - name: Determine release type
        id: release_type
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          IS_PRERELEASE="false"
          IS_DRAFT="false"

          if [ "${{ inputs.prerelease }}" = "true" ]; then IS_PRERELEASE="true"; fi
          if [ "${{ inputs.draft }}" = "true" ]; then IS_DRAFT="true"; fi
          if [[ "$VERSION" =~ [Aa]lpha|[Bb]eta|[Rr][Cc] ]]; then IS_PRERELEASE="true"; fi

          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "IS_DRAFT=$IS_DRAFT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: HB-RF-ETH-ng ${{ steps.get_version.outputs.VERSION_TAG }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/firmware_*.bin
            release/webui_*.bin
            release/bootloader.bin
            release/partitions.bin
            release/SHA256SUMS.txt
            release/version.txt
          draft: ${{ steps.release_type.outputs.IS_DRAFT }}
          prerelease: ${{ steps.release_type.outputs.IS_PRERELEASE }}
          make_latest: ${{ steps.release_type.outputs.IS_PRERELEASE == 'false' && steps.release_type.outputs.IS_DRAFT == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate update manifest
        if: steps.release_type.outputs.IS_DRAFT == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          IS_PRERELEASE="${{ steps.release_type.outputs.IS_PRERELEASE }}"

          FIRMWARE_FILE="firmware_${VERSION}.bin"
          WEBUI_FILE="webui_${VERSION}.bin"
          test -f "release/${FIRMWARE_FILE}"
          test -f "release/${WEBUI_FILE}"

          FIRMWARE_SHA256=$(awk -v file="$FIRMWARE_FILE" '$2 == file { print $1 }' release/SHA256SUMS.txt)
          WEBUI_SHA256=$(awk -v file="$WEBUI_FILE" '$2 == file { print $1 }' release/SHA256SUMS.txt)
          WEBUI_SIZE=$(stat -c '%s' "release/${WEBUI_FILE}")
          test -n "$FIRMWARE_SHA256"
          test -n "$WEBUI_SHA256"

          if [ "$IS_PRERELEASE" = "true" ]; then
            CHANNEL="beta"
            MANIFEST_FILES="beta.json"
          else
            CHANNEL="stable"
            MANIFEST_FILES="latest.json,beta.json"
          fi

          PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p manifest-out
          VERSION="$VERSION" \
          VERSION_TAG="$VERSION_TAG" \
          FIRMWARE_FILE="$FIRMWARE_FILE" \
          FIRMWARE_SHA256="$FIRMWARE_SHA256" \
          WEBUI_FILE="$WEBUI_FILE" \
          WEBUI_SHA256="$WEBUI_SHA256" \
          WEBUI_SIZE="$WEBUI_SIZE" \
          CHANNEL="$CHANNEL" \
          MANIFEST_FILES="$MANIFEST_FILES" \
          IS_PRERELEASE="$IS_PRERELEASE" \
          PUBLISHED_AT="$PUBLISHED_AT" \
            python3 - <<'PY'
          import json
          import os
          import re

          def excerpt(text, limit=300):
              if not text:
                  return ""
              flat = re.sub(r"\s+", " ", text).strip()
              return flat if len(flat) <= limit else flat[:limit].rstrip() + "…"

          version = os.environ["VERSION"]
          version_tag = os.environ["VERSION_TAG"]
          firmware_file = os.environ["FIRMWARE_FILE"]
          webui_file = os.environ["WEBUI_FILE"]
          channel = os.environ["CHANNEL"]
          manifest_files = [item.strip() for item in os.environ["MANIFEST_FILES"].split(",") if item.strip()]
          is_prerelease = os.environ["IS_PRERELEASE"] == "true"
          release_url = f"https://github.com/Xerolux/HB-RF-ETH-ng/releases/tag/{version_tag}"
          asset_base = f"https://github.com/Xerolux/HB-RF-ETH-ng/releases/download/{version_tag}"

          try:
              with open("release/RELEASE_NOTES.md", "r", encoding="utf-8") as file:
                  notes = file.read().strip()
          except FileNotFoundError:
              notes = ""

          manifest = {
              "version": version,
              "channel": channel,
              "isPrerelease": is_prerelease,
              "publishedAt": os.environ["PUBLISHED_AT"],
              "downloadUrl": f"{asset_base}/{firmware_file}",
              "sha256": os.environ["FIRMWARE_SHA256"],
              "releaseUrl": release_url,
              "notesUrl": release_url,
              "webui": {
                  "version": version,
                  "design": "newdesign",
                  "downloadUrl": f"{asset_base}/{webui_file}",
                  "sha256": os.environ["WEBUI_SHA256"],
                  "size": int(os.environ["WEBUI_SIZE"]),
                  "partition": "spiffs",
                  "format": 1,
              },
          }

          for manifest_file in manifest_files:
              with open(os.path.join("manifest-out", manifest_file), "w", encoding="utf-8") as file:
                  json.dump(manifest, file, indent=2)
                  file.write("\n")

          archive_entry = {
              **manifest,
              "tagName": version_tag,
              "name": f"HB-RF-ETH-ng {version_tag}",
              "prerelease": is_prerelease,
              "assetName": firmware_file,
              "webuiAssetName": webui_file,
              "notesExcerpt": excerpt(notes),
          }

          archive = []
          if os.path.exists("archive.json"):
              try:
                  with open("archive.json", "r", encoding="utf-8") as file:
                      archive_data = json.load(file)
                  archive = archive_data.get("releases", archive_data if isinstance(archive_data, list) else [])
              except (json.JSONDecodeError, OSError):
                  archive = []

          deduped = [item for item in archive if item.get("version") != version and item.get("tagName") != version_tag]
          archive_out = {
              "schema": 1,
              "updatedAt": os.environ["PUBLISHED_AT"],
              "releases": [archive_entry, *deduped][:50],
          }
          with open(os.path.join("manifest-out", "archive.json"), "w", encoding="utf-8") as file:
              json.dump(archive_out, file, indent=2)
              file.write("\n")
          PY

          for manifest in manifest-out/*.json; do
            echo "--- ${manifest} ---"
            cat "$manifest"
          done

      - name: Checkout main for manifest update
        if: steps.release_type.outputs.IS_DRAFT == 'false'
        uses: actions/checkout@v7
        with:
          ref: main
          path: manifest-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish update manifest to main
        if: steps.release_type.outputs.IS_DRAFT == 'false'
        working-directory: manifest-repo
        run: |
          VERSION_TAG="${{ steps.get_version.outputs.VERSION_TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp ../manifest-out/*.json .
          git add *.json
          if git diff --cached --quiet; then
            echo "Update manifests already up to date"
            exit 0
          fi
          git commit -m "chore: update manifests for ${VERSION_TAG}"
          git push origin main
