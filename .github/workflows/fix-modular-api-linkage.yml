name: Fix modular API linkage

on:
  push:
    branches:
      - feature/system-overview-theme-logs

permissions:
  contents: write

jobs:
  fix-linkage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/system-overview-theme-logs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move shared authentication declaration to external linkage
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [
              ('main/system_overview_api.cpp', '#include "webui_storage.h"\n\nnamespace\n{\n',
               '#include "webui_storage.h"\n\nextern esp_err_t validate_auth(httpd_req_t *req);\n\nnamespace\n{\n'),
              ('main/theme_api.cpp', '#include "security_headers.h"\n\nnamespace\n{\n',
               '#include "security_headers.h"\n\nextern esp_err_t validate_auth(httpd_req_t *req);\n\nnamespace\n{\n'),
          ]
          for filename, old, new in files:
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{filename}: include anchor count {text.count(old)}')
              text = text.replace(old, new, 1)
              inner = 'extern esp_err_t validate_auth(httpd_req_t *req);\n\n'
              # Remove the original declaration inside the anonymous namespace.
              first = text.find(inner)
              second = text.find(inner, first + len(inner))
              if first < 0 or second < 0:
                  raise SystemExit(f'{filename}: expected two declarations after insertion')
              text = text[:second] + text[second + len(inner):]
              path.write_text(text, encoding='utf-8')
          PY

      - name: Remove helper and push result
        run: |
          rm .github/workflows/fix-modular-api-linkage.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main/system_overview_api.cpp main/theme_api.cpp .github/workflows/fix-modular-api-linkage.yml
          git commit -m 'fix(api): keep shared authentication symbol external'
          git push origin HEAD:feature/system-overview-theme-logs
