name: Dispatch Beta.3 Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Remove dispatcher before release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/dispatch-beta3.yml
          git commit -m "ci: remove Beta.3 release dispatcher"
          git push origin HEAD:main

      - name: Publish Beta.3 prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag=v2.2.5-Beta.3 \
            -f prerelease=true \
            -f draft=false
