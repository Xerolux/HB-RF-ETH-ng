name: Query Gzip Hotfix Status

on:
  push:
    branches:
      - ops/beta3-release-status

permissions:
  actions: read
  contents: write

jobs:
  query:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ops/beta3-release-status
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Query workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list --repo "${{ github.repository }}" --workflow apply-gzip-24h-hotfix.yml --limit 10 --json databaseId,status,conclusion,createdAt,displayTitle,event,headSha,url > gzip-hotfix-status.json
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gzip-hotfix-status.json
          git commit -m "ci: record gzip hotfix status"
          git push origin HEAD:ops/beta3-release-status
