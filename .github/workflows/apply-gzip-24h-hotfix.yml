name: Apply Gzip and Strict 24h Hotfix

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v7
        with:
          ref: fix/recovery-dns-webui-gzip
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Finalize guarded update-check changes
        run: |
          set -euo pipefail
          git fetch origin ops/beta3-release-status
          git show origin/ops/beta3-release-status:scripts/finalize_gzip_24h_hotfix.py > /tmp/finalize.py
          python3 /tmp/finalize.py

      - name: Commit hotfix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: compact and guard the daily update check"
          git push origin HEAD:fix/recovery-dns-webui-gzip
