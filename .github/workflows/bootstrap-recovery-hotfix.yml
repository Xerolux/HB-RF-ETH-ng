name: Bootstrap Recovery and WebUI Hotfix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply recovery, DNS, upload guard and gzip fixes
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace(path_name, old, new):
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  if new in text:
                      return
                  raise SystemExit(f'Expected text not found in {path_name}: {old[:100]}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace(
              'main/settings.cpp',
              '  GET_IP_ADDR(handle, "gateway", _gateway, IPADDR_ANY);\n  GET_IP_ADDR(handle, "dns1", _dns1, IPADDR_ANY);\n  GET_IP_ADDR(handle, "dns2", _dns2, IPADDR_ANY);',
              '''  GET_IP_ADDR(handle, "gateway", _gateway, IPADDR_ANY);

  // Cloudflare DNS is the safe default when no DNS server was stored. Existing
  // non-empty user settings are preserved. This also migrates installations
  // that previously stored 0.0.0.0, which otherwise breaks NTP and OTA on a
  // static IPv4 configuration.
  ip4_addr_t defaultDns1;
  IP4_ADDR(&defaultDns1, 1, 1, 1, 1);
  GET_IP_ADDR(handle, "dns1", _dns1, defaultDns1.addr);
  GET_IP_ADDR(handle, "dns2", _dns2, IPADDR_ANY);
  if (_dns1.addr == IPADDR_ANY || _dns1.addr == IPADDR_NONE)
  {
    _dns1 = defaultDns1;
    ESP_ERROR_CHECK_WITHOUT_ABORT(nvs_set_u32(handle, "dns1", _dns1.addr));
    ESP_ERROR_CHECK_WITHOUT_ABORT(nvs_commit(handle));
  }'''
          )

          replace(
              'main/system_overview_api.cpp',
              '''    add_security_headers(req);
    httpd_resp_set_type(req, "text/html; charset=utf-8");''',
              '''    add_security_headers(req);
    // The recovery page is a self-contained immutable HTML document. Its small
    // inline script must be allowed locally; the normal New Design keeps the
    // stricter global script-src 'self' policy.
    httpd_resp_set_hdr(req, "Content-Security-Policy",
                       "default-src 'self'; style-src 'self' 'unsafe-inline'; "
                       "script-src 'self' 'unsafe-inline'; img-src 'self' data:; "
                       "connect-src 'self'; font-src 'self' data:; object-src 'none'; "
                       "base-uri 'self'; form-action 'self'; frame-ancestors 'self';");
    httpd_resp_set_type(req, "text/html; charset=utf-8");'''
          )

          storage = Path('main/webui_storage.cpp')
          text = storage.read_text(encoding='utf-8')
          substitutions = {
              'strcmp(js_encoding->valuestring, "br") == 0': 'strcmp(js_encoding->valuestring, "gzip") == 0',
              'strcmp(css_encoding->valuestring, "br") == 0': 'strcmp(css_encoding->valuestring, "gzip") == 0',
              '// Only the New Design is accepted. Brotli keeps the complete single-file\n    // Vue application inside the existing 320 KiB partition.': '// Only the New Design is accepted. Gzip is supported by browsers on the\n    // device\'s normal unencrypted private-LAN HTTP origin.',
              'BASE_PATH "/main.js.br"': 'BASE_PATH "/main.js.gz"',
              'BASE_PATH "/main.css.br"': 'BASE_PATH "/main.css.gz"',
              '{"/main.js", BASE_PATH "/main.js.br", "application/javascript", "br"}': '{"/main.js", BASE_PATH "/main.js.gz", "application/javascript", "gzip"}',
              '{"/main.css", BASE_PATH "/main.css.br", "text/css", "br"}': '{"/main.css", BASE_PATH "/main.css.gz", "text/css", "gzip"}',
          }
          for old, new in substitutions.items():
              if old not in text and new not in text:
                  raise SystemExit(f'Expected WebUI storage text not found: {old}')
              text = text.replace(old, new)
          storage.write_text(text, encoding='utf-8')

          package = Path('rename_webui_files.py')
          text = package.read_text(encoding='utf-8')
          text = text.replace('"main.js.br",\n        "main.css.br",', '"main.js.gz",\n        "main.css.gz",')
          text = text.replace('"main.js": "br",\n            "main.css": "br",', '"main.js": "gzip",\n            "main.css": "gzip",')
          package.write_text(text, encoding='utf-8')

          replace(
              'webui/src/firmwareupdate.vue',
              '''const handleFileSelect = (event) => {
  const selectedFile = event.target.files[0]
  if (selectedFile && selectedFile.name.endsWith('.bin')) {
    file.value = selectedFile
  }
}

const handleDrop = (event) => {
  isDragging.value = false
  const selectedFile = event.dataTransfer.files[0]
  if (selectedFile && selectedFile.name.endsWith('.bin')) {
    file.value = selectedFile
  }
}''',
              '''const WEBUI_IMAGE_SIZE = 0x50000
const isWebUiImage = (selectedFile) => {
  if (!selectedFile) return false
  const name = String(selectedFile.name || '').toLowerCase()
  return name.startsWith('webui_')
    || name === 'spiffs.bin'
    || Number(selectedFile.size) === WEBUI_IMAGE_SIZE
}

const acceptFirmwareFile = (selectedFile) => {
  if (!selectedFile || !selectedFile.name.toLowerCase().endsWith('.bin')) return
  if (isWebUiImage(selectedFile)) {
    clearFile()
    uiStore.pushToast({
      type: 'warning',
      title: 'WebUI-Datei erkannt',
      message: 'Diese Datei unter System → WebUI installieren, nicht als Firmware.',
      duration: 7000
    })
    return
  }
  file.value = selectedFile
}

const handleFileSelect = (event) => acceptFirmwareFile(event.target.files[0])

const handleDrop = (event) => {
  isDragging.value = false
  acceptFirmwareFile(event.dataTransfer.files[0])
}'''
          )

          for filename in ('webui/package.json', 'webui/package-lock.json'):
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              if '1.0.0-Beta.1' not in text and '1.0.0-Beta.2' not in text:
                  raise SystemExit(f'WebUI version not found in {filename}')
              path.write_text(text.replace('1.0.0-Beta.1', '1.0.0-Beta.2'), encoding='utf-8')

          for filename in ('docs/WEBUI_UPDATES.md', 'docs/RELEASE_VERSIONING.md'):
              path = Path(filename)
              if path.exists():
                  text = path.read_text(encoding='utf-8')
                  text = text.replace('Brotli', 'gzip').replace('brotli', 'gzip')
                  path.write_text(text, encoding='utf-8')
          PY

      - name: Commit source hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main/settings.cpp main/system_overview_api.cpp main/webui_storage.cpp rename_webui_files.py webui/src/firmwareupdate.vue webui/package.json webui/package-lock.json docs/WEBUI_UPDATES.md docs/RELEASE_VERSIONING.md
          git commit -m "fix: recover WebUI and default DNS safely"
          git push origin HEAD:${{ github.head_ref }}
