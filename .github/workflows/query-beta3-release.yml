name: Query Recovery Hotfix Failure

on:
  push:
    branches:
      - ops/beta3-release-status

permissions:
  actions: read
  contents: write

jobs:
  query:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout status branch
        uses: actions/checkout@v7
        with:
          ref: ops/beta3-release-status
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture failed job log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh run view 29741647493 \
            --repo "${{ github.repository }}" \
            --log-failed \
            > recovery-hotfix-failed.log

      - name: Commit failure report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recovery-hotfix-failed.log
          git commit -m "ci: record recovery hotfix failure"
          git push origin HEAD:ops/beta3-release-status
