name: Remove retired WebUI shell

on:
  push:
    branches:
      - feature/separate-webui-update

permissions:
  contents: write

jobs:
  remove-retired-shell:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/separate-webui-update
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make New Design the only application shell
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          app = Path('webui/src/app.vue')
          text = app.read_text(encoding='utf-8')
          text = once(
              text,
              '<div id="app" :class="{ \'newdesign-shell\': experimentalStore.testDesignEnabled, \'bare-layout\': isBareLayout }">',
              '<div id="app" class="newdesign-shell" :class="{ \'bare-layout\': isBareLayout }">',
              'root shell',
          )
          text = once(
              text,
              '<component :is="experimentalStore.testDesignEnabled ? NewDesignHeader : Header" />',
              '<NewDesignHeader />',
              'header component',
          )
          text = once(
              text,
              'import { useExperimentalStore, useLoginStore, useRestartUiStore, useSysInfoStore } from \'./stores.js\'',
              'import { useLoginStore, useRestartUiStore, useSysInfoStore } from \'./stores.js\'',
              'store import',
          )
          text = once(text, "import Header from './header.vue'\n", '', 'old header import')
          text = once(text, 'const experimentalStore = useExperimentalStore()\n', '', 'old store instance')
          app.write_text(text, encoding='utf-8')

          main = Path('webui/src/main.js')
          text = main.read_text(encoding='utf-8')
          text = once(
              text,
              'import { useExperimentalStore, useLoginStore, useThemeStore, useUiStore } from \'./stores.js\'',
              'import { useLoginStore, useThemeStore, useUiStore } from \'./stores.js\'',
              'main store import',
          )
          pattern = re.compile(
              r'// The New Design is no longer experimental or optional\..*?'
              r'// Activity tracking for idle timeout',
              re.S,
          )
          text, count = pattern.subn(
              '// The New Design is the only application shell.\n'
              "document.body.classList.add('newdesign-active')\n\n"
              '// Activity tracking for idle timeout',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'new-design initialization: expected one match, found {count}')
          main.write_text(text, encoding='utf-8')
          PY

      - name: Remove helper and push result
        run: |
          rm .github/workflows/remove-retired-webui.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add webui/src/app.vue webui/src/main.js .github/workflows/remove-retired-webui.yml
          git commit -m 'refactor(webui): remove retired application shell'
          git push origin HEAD:feature/separate-webui-update
