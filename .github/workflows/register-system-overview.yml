name: Register system overview API

on:
  push:
    branches:
      - feature/system-overview-theme-logs

permissions:
  contents: write

jobs:
  register-api:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/system-overview-theme-logs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register endpoint in WebUI server
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('main/webui.cpp')
          text = path.read_text(encoding='utf-8')

          old = '#include "system_reset.h"\n'
          new = '#include "system_reset.h"\n#include "system_overview_api.h"\n'
          if text.count(old) != 1:
              raise SystemExit('system_reset include anchor not unique')
          text = text.replace(old, new, 1)

          old = '    config.max_uri_handlers = 40;\n'
          new = '    // Reserve capacity for modular diagnostics/theme APIs.\n    config.max_uri_handlers = 44;\n'
          if text.count(old) != 1:
              raise SystemExit('max_uri_handlers anchor not unique')
          text = text.replace(old, new, 1)

          old = '        httpd_register_uri_handler(_httpd_handle, &log_stream_ws_uri);\n\n'
          new = ('        httpd_register_uri_handler(_httpd_handle, &log_stream_ws_uri);\n'
                 '        system_overview_api_register(_httpd_handle);\n\n')
          if text.count(old) != 1:
              raise SystemExit('log stream registration anchor not unique')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove helper and push result
        run: |
          rm .github/workflows/register-system-overview.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add main/webui.cpp .github/workflows/register-system-overview.yml
          git commit -m 'feat(system): register detailed overview endpoint'
          git push origin HEAD:feature/system-overview-theme-logs
