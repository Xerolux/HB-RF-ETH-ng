name: Register system overview page

on:
  push:
    branches:
      - feature/system-overview-theme-logs

permissions:
  contents: write

jobs:
  register-page:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/system-overview-theme-logs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add route and navigation entry
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main = Path('webui/src/main.js')
          text = main.read_text(encoding='utf-8')
          old = "import SystemLog from './systemlog.vue'\n"
          new = old + "import SystemOverview from './systemoverview.vue'\n"
          if text.count(old) != 1:
              raise SystemExit('SystemLog import anchor not unique')
          text = text.replace(old, new, 1)

          old = "    { path: '/systemlog', component: SystemLog, meta: { requiresAuth: true } },\n"
          new = ("    { path: '/systemlog', component: SystemLog, meta: { requiresAuth: true } },\n"
                 "    { path: '/system-overview', component: SystemOverview, meta: { requiresAuth: true } },\n")
          if text.count(old) != 1:
              raise SystemExit('systemlog route anchor not unique')
          text = text.replace(old, new, 1)
          main.write_text(text, encoding='utf-8')

          nav = Path('webui/src/composables/useHeaderNavigation.js')
          text = nav.read_text(encoding='utf-8')
          old = "    { to: '/settings', icon: 'settings', label: t('nav.settings'), group: 'system' },\n"
          new = ("    { to: '/settings', icon: 'settings', label: t('nav.settings'), group: 'system' },\n"
                 "    { to: '/system-overview', icon: 'cpu', label: t('sysinfo.system'), group: 'system' },\n")
          if text.count(old) != 1:
              raise SystemExit('settings navigation anchor not unique')
          nav.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove helper and push result
        run: |
          rm .github/workflows/register-system-overview-page.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add webui/src/main.js webui/src/composables/useHeaderNavigation.js .github/workflows/register-system-overview-page.yml
          git commit -m 'feat(system): add system overview navigation page'
          git push origin HEAD:feature/system-overview-theme-logs
